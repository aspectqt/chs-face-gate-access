<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CHS Gate Access | Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    {% include 'partials/theme_assets.html' %}
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-slate-50 to-emerald-50 text-slate-800" data-authenticated="0" data-user-theme="">
    <main class="min-h-screen flex items-center justify-center px-4 py-8">
        <section class="w-full max-w-md rounded-2xl border border-slate-200 bg-white shadow-xl shadow-slate-300/35">
            <div class="px-7 pt-7 pb-5 border-b border-slate-100 text-center">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="CHS Logo" class="mx-auto h-16 w-16 rounded-full object-cover ring-2 ring-emerald-100">
                <h1 class="mt-4 text-xl font-semibold tracking-wide text-slate-900">FACE RECOGNITION STUDENT  GATE ACCESS SYSTEM  WITH SMS NOTIFICATION FOR CAWITAN HIGH SCHOOL</h1>
                <p class="mt-1 text-sm text-slate-500">Secure institutional login portal</p>
            </div>

            <div class="px-7 py-6">
                {% if error %}
                <div id="serverError" class="mb-4 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
                    {{ error }}
                </div>
                {% endif %}

                <div id="clientError" class="mb-4 hidden rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"></div>

                <form method="POST" id="loginForm" class="space-y-4" autocomplete="off" autocapitalize="none" spellcheck="false" novalidate>
                    <div class="hidden" aria-hidden="true">
                        <input type="text" name="auth_user_placeholder" tabindex="-1" autocomplete="username">
                        <input type="password" name="auth_pass_placeholder" tabindex="-1" autocomplete="current-password">
                    </div>
                    <div>
                        <label for="username" class="text-sm font-medium text-slate-700">Username</label>
                        <div class="relative mt-1">
                            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A9 9 0 1118.878 6.196 9 9 0 015.12 17.804z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 12a3 3 0 100-6 3 3 0 000 6z" />
                                </svg>
                            </span>
                            <input
                                type="text"
                                id="username"
                                name="username"
                                required
                                maxlength="80"
                                value="{{ entered_username|default('') }}"
                                placeholder="Enter your username"
                                autocomplete="off"
                                autocapitalize="none"
                                autocorrect="off"
                                spellcheck="false"
                                data-lpignore="true"
                                data-1p-ignore="true"
                                data-form-type="other"
                                class="w-full rounded-xl border border-slate-300 bg-white pl-10 pr-3 py-2.5 text-sm text-slate-800 outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200"
                            >
                        </div>
                    </div>

                    <div>
                        <label for="password" class="text-sm font-medium text-slate-700">Password</label>
                        <div class="relative mt-1">
                            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c1.657 0 3-1.343 3-3V6a3 3 0 10-6 0v2c0 1.657 1.343 3 3 3z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 11h14a2 2 0 012 2v7a2 2 0 01-2 2H5a2 2 0 01-2-2v-7a2 2 0 012-2z" />
                                </svg>
                            </span>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                required
                                maxlength="160"
                                placeholder="Enter your password"
                                autocomplete="new-password"
                                autocorrect="off"
                                spellcheck="false"
                                data-lpignore="true"
                                data-1p-ignore="true"
                                data-form-type="other"
                                class="w-full rounded-xl border border-slate-300 bg-white pl-10 pr-11 py-2.5 text-sm text-slate-800 outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200"
                            >
                            <button type="button" id="togglePassword" aria-label="Show or hide password"
                                class="absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 hover:text-slate-600 transition">
                                <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between gap-4">
                        <label class="inline-flex items-center gap-2 text-sm text-slate-600">
                            <input type="checkbox" id="remember_me" name="remember_me" class="h-4 w-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500"
                                {% if remember_me %}checked{% endif %}>
                            <span>Remember Me</span>
                        </label>
                        <a href="mailto:support@chs-gate.local" class="text-sm font-medium text-emerald-700 hover:text-emerald-800 transition">Need help?</a>
                    </div>

                    <button type="submit" id="loginButton"
                        class="w-full inline-flex items-center justify-center gap-2 rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-70">
                        <span id="loginButtonText">Sign In</span>
                        <svg id="loginSpinner" class="hidden h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-90" fill="currentColor" d="M12 2a10 10 0 00-10 10h4a6 6 0 016-6V2z"></path>
                        </svg>
                    </button>
                </form>
            </div>

            <div class="px-7 pb-6 text-center">
                <p class="text-xs text-slate-500">&copy; {{ current_year }} CHS Gate Access System</p>
            </div>
        </section>
    </main>

    <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const clientError = document.getElementById('clientError');
    const loginButton = document.getElementById('loginButton');
    const loginButtonText = document.getElementById('loginButtonText');
    const loginSpinner = document.getElementById('loginSpinner');

    // Reduce browser autofill popups by unlocking fields only on first focus.
    [usernameInput, passwordInput].forEach((field) => {
        if (!field) return;
        field.setAttribute('readonly', 'readonly');
        field.addEventListener('focus', () => {
            field.removeAttribute('readonly');
        }, { once: true });
    });

    function showClientError(message) {
        clientError.textContent = message;
        clientError.classList.remove('hidden');
    }

    function clearClientError() {
        clientError.textContent = '';
        clientError.classList.add('hidden');
    }

    togglePassword.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
    });

    loginForm.addEventListener('submit', (event) => {
        clearClientError();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
            event.preventDefault();
            showClientError('Username and password are required.');
            return;
        }

        loginButton.disabled = true;
        loginButtonText.textContent = 'Signing in...';
        loginSpinner.classList.remove('hidden');
    });
    </script>
</body>
</html>
